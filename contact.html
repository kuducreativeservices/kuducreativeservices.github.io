<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — Kudu Creative</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --forest:   #122620;
    --redwine:  #220f10;
    --savannah: #9e663f;
    --ivory:    #efeeed;
    --rose:     #e8d1d1;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    font-family: 'Montserrat', sans-serif;
    font-weight: 400;
    color: var(--ivory);
    background: var(--redwine);
    overflow-x: hidden;
  }

  h1, h2, h3, h4 {
    font-family: 'Playfair Display', serif;
    font-weight: 300;
  }

  /* ======================== NAV ======================== */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 1000;
    background: var(--redwine);
    padding: 0.9rem 2.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid rgba(232,209,209,0.1);
  }

  .nav-logo-img {
    height: 42px;
    width: auto;
    display: block;
    mix-blend-mode: screen;
  }

  .nav-links {
    display: flex;
    gap: 2.5rem;
    list-style: none;
  }

  .nav-links a {
    font-family: 'Montserrat', sans-serif;
    font-weight: 400;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    font-size: 0.68rem;
    color: rgba(239,238,237,0.75);
    text-decoration: none;
    transition: color 0.3s;
    position: relative;
  }

  .nav-links a::after {
    content: '';
    position: absolute;
    bottom: -4px; left: 0;
    width: 0; height: 1px;
    background: var(--rose);
    transition: width 0.3s ease;
  }

  .nav-links a:hover { color: var(--rose); }
  .nav-links a:hover::after { width: 100%; }
  .nav-links a.active { color: var(--rose); }
  .nav-links a.active::after { width: 100%; }

  /* ======================== CONTACT SECTION ======================== */
  .contact-section {
    min-height: 100vh;
    background: var(--forest);
    padding: 10rem 3rem 8rem;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
  }

  .contact-section::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url('assets/Pattern.png');
    background-size: cover;
    background-position: center;
    opacity: 0.18;
    pointer-events: none;
  }

  .contact-inner {
    position: relative;
    z-index: 2;
    max-width: 800px;
    margin: 0 auto;
    width: 100%;
    text-align: center;
  }

  .contact-inner .sub {
    font-family: 'Montserrat', sans-serif;
    font-weight: 400;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    font-size: 0.72rem;
    color: var(--rose);
    margin-bottom: 1rem;
    display: block;
  }

  .contact-inner h1 {
    font-size: clamp(2rem, 4vw, 3.5rem);
    color: var(--ivory);
    line-height: 1.15;
    margin-bottom: 0.75rem;
  }

  .contact-inner h1 em {
    font-style: italic;
    color: var(--rose);
  }

  .contact-inner > p {
    color: rgba(239,238,237,0.5);
    font-size: 0.9rem;
    margin-bottom: 3rem;
    line-height: 1.7;
  }

  /* ======================== FORM ======================== */
  .contact-form {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    text-align: left;
  }

  .contact-form .full-width { grid-column: 1 / -1; }

  .contact-form label {
    display: block;
    font-family: 'Montserrat', sans-serif;
    font-weight: 400;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    font-size: 0.6rem;
    color: var(--rose);
    margin-bottom: 0.4rem;
  }

  .contact-form .optional-tag {
    color: rgba(232,209,209,0.4);
    font-size: 0.55rem;
    margin-left: 0.4rem;
    text-transform: none;
    letter-spacing: 0;
  }

  .contact-form input,
  .contact-form textarea {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(232,209,209,0.2);
    color: var(--ivory);
    font-family: 'Montserrat', sans-serif;
    font-weight: 400;
    font-size: 0.85rem;
    padding: 0.85rem 1rem;
    outline: none;
    transition: border-color 0.3s;
    -webkit-appearance: none;
    border-radius: 0;
  }

  .contact-form input::placeholder,
  .contact-form textarea::placeholder { color: rgba(239,238,237,0.3); }

  .contact-form input:focus,
  .contact-form textarea:focus { border-color: var(--rose); }

  .contact-form textarea {
    resize: vertical;
    min-height: 150px;
  }

  .contact-form .submit-wrap {
    grid-column: 1 / -1;
    text-align: center;
    margin-top: 1rem;
  }

  .btn {
    display: inline-block;
    font-family: 'Montserrat', sans-serif;
    font-weight: 400;
    text-transform: uppercase;
    letter-spacing: 0.22em;
    font-size: 0.67rem;
    padding: 0.85rem 2.5rem;
    text-decoration: none;
    transition: all 0.3s;
    cursor: pointer;
    border: none;
    background: var(--savannah);
    color: var(--ivory);
    border: 1px solid var(--savannah);
  }

  .btn:hover {
    background: #b57848;
    border-color: #b57848;
    letter-spacing: 0.28em;
  }

  .form-success {
    display: none;
    color: var(--rose);
    font-size: 0.85rem;
    margin-top: 1rem;
    font-style: italic;
  }

  /* Divider */
  .divider {
    width: 55px; height: 1px;
    background: var(--savannah);
    margin: 1.5rem auto;
  }

  /* ======================== FOOTER ======================== */
  footer {
    background: var(--redwine);
    padding: 2.5rem 5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-top: 1px solid rgba(232,209,209,0.08);
  }

  footer img { height: 42px; width: auto; mix-blend-mode: screen; }

  footer p {
    color: rgba(239,238,237,0.3);
    font-size: 0.72rem;
    font-weight: 400;
  }

  /* ======================== REVEAL ======================== */
  .reveal {
    opacity: 0;
    transform: translateY(24px);
    transition: opacity 0.7s ease, transform 0.7s ease;
  }
  .reveal.visible { opacity: 1; transform: translateY(0); }

  /* ======================== RESPONSIVE ======================== */
  @media (max-width: 900px) {
    nav { padding: 0.8rem 1.5rem; }
    .nav-links { gap: 1.5rem; }
    .nav-logo-img { height: 34px; }
    .contact-section { padding: 8rem 1.5rem 6rem; }
    .contact-form { grid-template-columns: 1fr; }
    .contact-form .full-width { grid-column: 1; }
    footer { flex-direction: column; gap: 1rem; text-align: center; padding: 2rem; }
  }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="index.html">
    <img src="assets/Header Logo.png" alt="Kudu Creative" class="nav-logo-img">
  </a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="collections.html">Collections</a></li>
    <li><a href="contact.html" class="active">Contact</a></li>
  </ul>
</nav>

<!-- CONTACT -->
<section class="contact-section">
  <div class="contact-inner">
    <span class="sub reveal">Get in Touch</span>
    <h1 class="reveal">Reach out for custom work<br><em>or questions.</em></h1>
    <div class="divider reveal"></div>
    <p class="reveal">Fill out the form below and we'll get back to you shortly.</p>

    <form class="contact-form reveal" action="https://formspree.io/f/mojygdkd" method="POST">

      <div>
        <label for="name">Name</label>
        <input type="text" id="name" name="name" placeholder="Your name" required>
      </div>

      <div>
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required>
      </div>

      <div>
        <label for="phone">Phone Number <span class="optional-tag">(optional)</span></label>
        <input type="tel" id="phone" name="phone" placeholder="(555) 000-0000">
      </div>

      <div></div><!-- spacer -->

      <div class="full-width">
        <label for="message">Comments</label>
        <textarea id="message" name="message" placeholder="Tell us what you're working on, what you need, or just say hello." required></textarea>
      </div>

      <div class="submit-wrap">
        <button type="submit" class="btn">Send Message</button>
        <p class="form-success">Thank you — we'll be in touch soon.</p>
      </div>

    </form>
  </div>
</section>

<!-- FOOTER -->
<footer>
  <img src="assets/Header Logo.png" alt="Kudu Creative Services">
  <p>&copy; 2025 Kudu Creative Services. All rights reserved.</p>
</footer>

<script>
  const reveals = document.querySelectorAll('.reveal');
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.classList.add('visible');
        observer.unobserve(e.target);
      }
    });
  }, { threshold: 0.08, rootMargin: '0px 0px -40px 0px' });
  reveals.forEach(el => observer.observe(el));
</script>
</body>
</html>
